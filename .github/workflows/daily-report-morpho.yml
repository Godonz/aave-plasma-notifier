# .github/workflows/daily-report-morpho.yml
name: Morpho Daily Status Report

on:
  schedule:
    # 8:15 AM Thailand Time (UTC+7) is 01:15 UTC (Off-peak schedule to avoid delays)
    - cron: '15 1 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  daily-report-morpho:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run Daily Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MORPHO_UTILIZATION_THRESHOLD: ${{ vars.MORPHO_UTILIZATION_THRESHOLD }}
        MORPHO_VAULT_ADDRESS: ${{ vars.MORPHO_VAULT_ADDRESS }}
        MORPHO_CHAIN_ID: ${{ vars.MORPHO_CHAIN_ID }}
        SEND_ALWAYS: 'true' # Force notification regardless of threshold
      run: node check-morpho.js
