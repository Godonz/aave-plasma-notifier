# .github/workflows/check-morpho.yml
name: Morpho Vault APY Notifier

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI / API

jobs:
  check-morpho-apy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run Morpho Check
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MORPHO_UTILIZATION_THRESHOLD: ${{ vars.MORPHO_UTILIZATION_THRESHOLD }}
        MORPHO_VAULT_ADDRESS: ${{ vars.MORPHO_VAULT_ADDRESS }}
        MORPHO_CHAIN_ID: ${{ vars.MORPHO_CHAIN_ID }}
      run: node check-morpho.js
