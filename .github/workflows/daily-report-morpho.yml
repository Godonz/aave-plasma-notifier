# .github/workflows/daily-report-morpho.yml
name: Morpho Daily Status Report

on:
  schedule:
    # 7:00 AM Thailand Time (UTC+7) is 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  daily-report-morpho:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run Daily Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MORPHO_UTILIZATION_THRESHOLD: ${{ vars.MORPHO_UTILIZATION_THRESHOLD }}
        MORPHO_VAULT_ADDRESS: ${{ vars.MORPHO_VAULT_ADDRESS }}
        MORPHO_CHAIN_ID: ${{ vars.MORPHO_CHAIN_ID }}
        SEND_ALWAYS: 'true' # Force notification regardless of threshold
      run: node check-morpho.js
