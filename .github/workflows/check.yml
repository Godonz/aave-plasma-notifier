# .github/workflows/check.yml
name: Aave Utilization Notifier

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI / API

jobs:
  check-utilization:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run Aave check
      env:
        # Secure credentials loaded from GitHub Repository Secrets & Variables
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        UTILIZATION_THRESHOLD: ${{ vars.UTILIZATION_THRESHOLD }}
        RPC_URL: ${{ vars.RPC_URL }}
        ASSET_ADDRESS: ${{ vars.ASSET_ADDRESS }}
        POOL_ADDRESS: ${{ vars.POOL_ADDRESS }}
        DATA_PROVIDER_ADDRESS: ${{ vars.DATA_PROVIDER_ADDRESS }}
      run: node check.js
